<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>ZRC Spice Market Insight</title>
    <link rel="stylesheet" href="https://unpkg.com/klinecharts@latest/dist/klinecharts.min.css">
    <style>
        html, body { margin:0; padding:0; width:100%; height:100%; background:#1b1b1f; overflow:hidden; }
        #container { width:100vw; height:100vh; }
    </style>
</head>
<body>
<div id="container"></div>

<script src="https://unpkg.com/klinecharts@latest/dist/klinecharts.umd.js"></script>

<script>
    const chart = klinecharts.init('container', {
        theme: 'dark',
        styles: {
            candle: { upColor: '#00C853', downColor: '#FF3D00' },
            line: { color: '#F37021' }  // 爱马仕橙
        },
        watermark: { text: 'ZRC Spices - Price Trends', textColor: '#666' }
    });

    // 自定义数据（模拟香料价格）
    const dataList = [];
    let price = 8.5;
    for (let i = 0; i < 200; i++) {
        price += (Math.random() - 0.5) * 0.25;
        const ts = Date.now() - (200 - i) * 86400000;
        dataList.push({
            timestamp: ts,
            open: +price.toFixed(2),
            high: +(price + Math.random() * 0.5).toFixed(2),
            low: +(price - Math.random() * 0.5).toFixed(2),
            close: +(price + (Math.random() - 0.5) * 0.2).toFixed(2),
            volume: Math.floor(Math.random() * 50000 + 15000)
        });
    }
    chart.setDataList(dataList);

    // 加常见指标
    chart.createIndicator('MA', false, { calcParams: [5, 10, 20] });
    chart.createIndicator('VOL', false);

    console.log("免费版K线图加载完成！");
</script>
</body>
</html>
