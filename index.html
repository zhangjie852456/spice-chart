<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>ZRC Spice Pro</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@klinecharts/pro/dist/klinecharts-pro.css">
    <style>
        html, body { margin: 0; padding: 0; width: 100%; height: 100%; background: #1b1b1f; }
        #chart-container { width: 100vw; height: 100vh; }
    </style>
</head>
<body>
<div id="chart-container"></div>

<script src="https://cdn.jsdelivr.net/npm/klinecharts/dist/klinecharts.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@klinecharts/pro/dist/klinecharts-pro.umd.js"></script>

<script>
    window.onload = function() {
        // 3. 安全检查：如果库没加载好，直接弹窗报错（不让你再白等）
        if (typeof klinecharts === 'undefined' || typeof klinechartsPro === 'undefined') {
            alert("依赖库加载失败！请检查 CDN 链接或网络环境。");
            return;
        }

        // 4. 严格按照官方 Pro 仓库的 UMD 初始化方式
        const chartInstance = new klinechartsPro.DefaultKLineChart({
            container: document.getElementById('chart-container'),
            symbol: { ticker: 'STAR_ANISE', name: '大红八角' },
            datafeed: {
                searchSymbols: () => Promise.resolve([{ ticker: 'STAR_ANISE', name: '大红八角' }]),
                getHistoryKLineData: () => {
                    // 模拟 200 条行情数据，确保一加载就有图
                    const data = [];
                    let price = 50;
                    const now = Date.now();
                    for (let i = 0; i < 200; i++) {
                        price += (Math.random() - 0.5) * 2;
                        data.unshift({
                            timestamp: now - i * 86400000,
                            open: price, high: price + 1, low: price - 1, close: price + 0.3, volume: 100
                        });
                    }
                    return Promise.resolve(data);
                },
                subscribe: () => {},
                unsubscribe: () => {}
            },
            theme: 'dark',
            locale: 'zh-CN'
        });
    };
</script>
</body>
</html>
