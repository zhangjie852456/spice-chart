<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>ZRC Spice Pro - K线行情</title>
    <!-- 本地CSS -->
    <link rel="stylesheet" href="/assets/css/klinecharts-pro.min.css">  <!-- 改成你的实际路径 -->
    <style>
        html, body { margin:0; padding:0; width:100%; height:100%; background:#1b1b1f; overflow:hidden; font-family:"Microsoft YaHei",sans-serif; }
        #container { width:100vw; height:100vh; }
    </style>
</head>
<body>
<div id="container"></div>

<!-- 本地JS -->
<script src="/assets/js/klinecharts-pro.umd.min.js"></script>  <!-- 改成你的实际路径 -->

<script>
    // 检查加载
    if (typeof klinechartspro === 'undefined' || !klinechartspro.KLineChartPro) {
        alert("本地库加载失败！检查文件路径是否正确（F12 Console看404错误）。");
        console.error("klinechartspro:", klinechartspro);
    } else {
        const chart = new klinechartspro.KLineChartPro({
            container: document.getElementById('container'),
            symbol: { ticker: 'STAR_ANISE', name: '大红八角 (USD/kg)' },
            period: { multiplier: 1, timespan: 'day', text: '日线' },
            datafeed: {
                searchSymbols: () => Promise.resolve([{ ticker: 'STAR_ANISE', name: '大红八角' }]),
                getHistoryKLineData: () => {
                    const data = [];
                    let price = 8.5;
                    for (let i = 0; i < 200; i++) {
                        price += (Math.random() - 0.5) * 0.22;
                        const ts = Date.now() - (200 - i) * 86400000;
                        data.push({
                            timestamp: ts,
                            open: +price.toFixed(2),
                            high: +(price + Math.random() * 0.45).toFixed(2),
                            low: +(price - Math.random() * 0.45).toFixed(2),
                            close: +(price + (Math.random() - 0.5) * 0.18).toFixed(2),
                            volume: Math.floor(Math.random() * 45000 + 12000)
                        });
                    }
                    console.log("数据生成完成：" + data.length + "条");
                    return Promise.resolve(data);
                },
                subscribe: () => {},
                unsubscribe: () => {}
            },
            theme: 'dark',
            locale: 'zh-CN'
        });
        console.log("K线图初始化成功！");
    }
</script>
</body>
</html>
