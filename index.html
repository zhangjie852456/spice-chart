<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>ZRC Spice Pro 终端</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@klinecharts/pro/dist/klinecharts-pro.css">
    <style>
        html, body { margin: 0; padding: 0; width: 100%; height: 100%; background: #1b1b1f; overflow: hidden; }
        #chart-container { width: 100vw; height: 100vh; }
        /* 遮罩逻辑 */
        #pay-mask { position: absolute; right: 0; top: 0; width: 260px; height: 100%; background: rgba(27,27,31,0.85); backdrop-filter: blur(8px); border-left: 2px solid #f54346; z-index: 1000; display: none; flex-direction: column; justify-content: center; align-items: center; color: #fff; font-family: sans-serif; }
        #pay-mask button { margin-top: 18px; background: #f54346; border: none; color: white; padding: 10px 24px; border-radius: 6px; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>

<div id="pay-mask">
    <div style="font-size:18px;font-weight:bold;">🔒 最新行情已锁定</div>
    <div style="font-size:13px;color:#aaa;margin-top:10px;">解锁查看最新 60 天趋势</div>
    <button onclick="unlock()">立即解锁</button>
</div>

<div id="chart-container"></div>

<script src="https://cdn.jsdelivr.net/npm/@klinecharts/pro/dist/klinecharts-pro.umd.js"></script>

<script>
    let isUnlocked = false;

    // 1. 内置数据生成，彻底摆脱 fetch 报错
    function generateMockData() {
        const data = [];
        let price = 40;
        const now = Date.now();
        for (let i = 0; i < 300; i++) {
            price += (Math.random() - 0.5) * 2;
            data.unshift({
                timestamp: now - i * 24 * 60 * 60 * 1000,
                open: price, high: price + 1, low: price - 1, close: price + 0.5, volume: 1000
            });
        }
        return data;
    }

    // 2. 这里的 P 大写是关键
    const chartInstance = new klinechartsPro.DefaultKLineChart({
        container: document.getElementById('chart-container'),
        symbol: { ticker: 'STAR_ANISE', name: '大红八角 (Star Anise)' },
        datafeed: {
            searchSymbols: () => Promise.resolve([{ ticker: 'STAR_ANISE', name: '大红八角' }]),
            getHistoryKLineData: () => Promise.resolve(generateMockData()),
            subscribe: () => {},
            unsubscribe: () => {}
        },
        theme: 'dark',
        locale: 'zh-CN'
    });

    // 3. 稳健的遮罩逻辑：避开 getWidget 报错
    function checkLock() {
        if (isUnlocked) return;
        const chart = chartInstance.getWidget().getChart(); // 在这里获取底层实例
        const dataList = chart.getDataList();
        if (dataList.length === 0) return;

        const visibleRange = chart.getVisibleRange();
        const lastData = dataList[dataList.length - 1];
        const lockThreshold = lastData.timestamp - (60 * 24 * 60 * 60 * 1000);

        // 如果可视区域的右侧时间超过了锁定阈值，弹窗
        if (dataList[Math.min(Math.floor(visibleRange.to), dataList.length - 1)].timestamp > lockThreshold) {
            document.getElementById('pay-mask').style.display = 'flex';
        } else {
            document.getElementById('pay-mask').style.display = 'none';
        }
    }

    // 延迟一秒绑定，防止图表还没加载完就计算
    setTimeout(() => {
        chartInstance.getWidget().getChart().subscribeAction('onVisibleRangeChange', checkLock);
    }, 1000);

    function unlock() {
        isUnlocked = true;
        document.getElementById('pay-mask').style.display = 'none';
    }
</script>
</body>
</html>
