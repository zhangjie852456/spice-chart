<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>ZRC 香料行情 Pro</title>
    <link rel="stylesheet" href="https://unpkg.com/@klinecharts/pro/dist/klinecharts-pro.css">
    <style>
        html, body { margin: 0; padding: 0; width: 100%; height: 100%; background: #1b1b1f; overflow: hidden; }
        #chart-container { width: 100vw; height: 100vh; }
        /* 锁定遮罩 */
        #pay-mask { position: absolute; right: 0; top: 0; width: 280px; height: 100%; background: rgba(27,27,31,0.9); backdrop-filter: blur(10px); border-left: 2px solid #f54346; z-index: 1000; display: none; flex-direction: column; justify-content: center; align-items: center; color: #fff; font-family: sans-serif; }
        #pay-mask button { margin-top: 20px; background: #f54346; border: none; color: white; padding: 12px 30px; border-radius: 6px; cursor: pointer; font-weight: bold; }

</head>
<body>

<div id="pay-mask">
    <div style="font-size:20px;font-weight:bold;">🔒 核心行情已锁定</div>
    <div style="font-size:14px;color:#aaa;margin-top:10px;">需解锁查看近 60 天趋势</div>
    <button onclick="unlock()">立即解锁</button>
</div>

<div id="chart-container"></div>

<script src="https://unpkg.com/klinecharts/dist/klinecharts.min.js"></script>

    // 内置模拟数据，确保 GitHub 上能直接跑通
    function generateMockData() {
        const data = [];
        let price = 50;
        const now = Date.now();
        for (let i = 0; i < 500; i++) {
            price += (Math.random() - 0.5) * 3;
            data.unshift({
                timestamp: now - i * 24 * 60 * 60 * 1000,
                open: price, high: price + 2, low: price - 2, close: price + 1, volume: Math.random() * 1000
            });
        }
        return data;
    }

                    unsubscribe: () => {}
                },

                locale: 'zh-CN'
