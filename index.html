<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>ZRC Spice Pro - K线行情终端</title>
    <!-- 直接引用GitHub raw源文件 -->
    <link rel="stylesheet" href="https://raw.githubusercontent.com/klinecharts/pro/main/dist/klinecharts-pro.min.css">
    <style>
        html, body { margin:0; padding:0; width:100%; height:100%; background:#1b1b1f; overflow:hidden; font-family:"Microsoft YaHei",sans-serif; }
        #container { width:100vw; height:100vh; }
    </style>
</head>
<body>
<div id="container"></div>

<!-- GitHub raw JS -->
<script src="https://raw.githubusercontent.com/klinecharts/pro/main/dist/klinecharts-pro.umd.min.js"></script>

<script>
    // 调试全局对象
    console.log("klinechartspro 对象：", window.klinechartspro);

    if (typeof window.klinechartspro === 'undefined' || !window.klinechartspro.KLineChartPro) {
        alert("GitHub raw库加载失败！\n1. 检查F12 Network是否有200 OK（内容大小应>100KB）\n2. 尝试VPN或换浏览器\n3. 或下载文件上传Hostinger本地化");
        console.error("加载失败，klinechartspro：", window.klinechartspro);
    } else {
        const chart = new window.klinechartspro.KLineChartPro({
            container: document.getElementById('container'),
            symbol: { ticker: 'STAR_ANISE', name: '大红八角价格趋势 (USD/kg)' },
            period: { multiplier: 1, timespan: 'day', text: '日线' },
            datafeed: {
                searchSymbols: () => Promise.resolve([{ ticker: 'STAR_ANISE', name: '大红八角' }]),
                getHistoryKLineData: () => {
                    const data = [];
                    let price = 8.5;
                    for (let i = 0; i < 180; i++) {  // 180条数据，曲线更自然
                        price += (Math.random() - 0.5) * 0.18;
                        const ts = Date.now() - (180 - i) * 86400000;
                        data.push({
                            timestamp: ts,
                            open: +price.toFixed(2),
                            high: +(price + Math.random() * 0.35).toFixed(2),
                            low: +(price - Math.random() * 0.35).toFixed(2),
                            close: +(price + (Math.random() - 0.5) * 0.15).toFixed(2),
                            volume: Math.floor(Math.random() * 38000 + 9000)
                        });
                    }
                    console.log("模拟数据生成完成：" + data.length + "条");
                    return Promise.resolve(data);
                },
                subscribe: () => {},
                unsubscribe: () => {}
            },
            theme: 'dark',
            locale: 'zh-CN'
        });

        console.log("KLineChartPro 初始化成功！实例：", chart);
    }
</script>
</body>
</html>
