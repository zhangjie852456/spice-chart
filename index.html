<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZRC Spice Pro</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@klinecharts/pro/dist/klinecharts-pro.css">
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background-color: #ffffff; }
        #chart { width: 100vw; height: 100vh; }
    </style>
</head>
<body>
    <div id="chart"></div>
    <script src="https://cdn.jsdelivr.net/npm/@klinecharts/pro/dist/klinecharts-pro.umd.js"></script>
    <script>
        window.onload = function() {
            // 3. 您的 20 多个品种名单（先列 3 个样板）
            const SYMBOLS = [
                { symbol: 'STAR', name: '大红八角 (Star Anise)', exchange: 'YULIN', ticker: 'STAR_ANISE' },
                { symbol: 'CINN', name: '肉桂 (Cinnamon)', exchange: 'YULIN', ticker: 'CINNAMON' },
                { symbol: 'PEPPER', name: '黑胡椒 (Black Pepper)', exchange: 'YULIN', ticker: 'BLACK_PEPPER' }
            ];

            // 4. 使用官方指定的 UMD 初始化方式
            const chart = new klinechartsPro.DefaultKLineChart({
                container: document.getElementById('chart'),
                symbol: SYMBOLS[0],
                datafeed: {
                    searchSymbols: (search) => Promise.resolve(SYMBOLS),
                    getHistoryKLineData: (symbol) => Promise.resolve([
                        { timestamp: 1704067200000, open: 30, high: 35, low: 29, close: 33, volume: 1000 }
                    ]),
                    subscribe: () => {},
                    unsubscribe: () => {}
                },
                theme: 'light',
                locale: 'zh-CN',
                drawingBar: true, // 开启侧边画线工具
                symbolSearch: true // 开启品种搜索框
            });
        };
    </script>
</body>
</html>
