<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>ZRC Spice Pro 终端</title>
    <link rel="stylesheet" href="https://klinecharts.github.io/pro/klinecharts-pro.css">
    <style>
        html, body { margin: 0; padding: 0; width: 100%; height: 100%; background: #1b1b1f; overflow: hidden; }
        #chart-container { width: 100vw; height: 100vh; }
    </style>
</head>
<body>
<div id="chart-container"></div>

<script src="https://klinecharts.github.io/pro/klinecharts.min.js"></script>
<script src="https://klinecharts.github.io/pro/klinecharts-pro.umd.js"></script>

<script>
    window.onload = function() {
        // 检查源文件是否真的加载成功
        if (typeof klinechartsPro === 'undefined') {
            console.error("源文件加载失败，请检查网络是否拦截了 GitHub 域名");
            return;
        }

        const chartInstance = new klinechartsPro.DefaultKLineChart({
            container: document.getElementById('chart-container'),
            symbol: { ticker: 'STAR_ANISE', name: '大红八角 (Star Anise)' },
            datafeed: {
                searchSymbols: () => Promise.resolve([{ ticker: 'STAR_ANISE', name: '大红八角' }]),
                getHistoryKLineData: () => {
                    const data = [];
                    let price = 50;
                    const now = Date.now();
                    for (let i = 0; i < 200; i++) {
                        price += (Math.random() - 0.5) * 2;
                        data.unshift({
                            timestamp: now - i * 86400000,
                            open: price, high: price + 1.5, low: price - 1.5, close: price + 0.6, volume: 500
                        });
                    }
                    return Promise.resolve(data);
                }
            },
            theme: 'dark',
            locale: 'zh-CN'
        });
    };
</script>
</body>
</html>
