<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZRC Spice Pro</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@klinecharts/pro/dist/klinecharts-pro.css">
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background-color: #ffffff; }
        #chart { width: 100vw; height: 100vh; }
    </style>
</head>
<body>
    <div id="chart"></div>
    <script src="https://cdn.jsdelivr.net/npm/@klinecharts/pro/dist/klinecharts-pro.umd.js"></script>
    <script>
        // 等待库完全加载
        window.onload = function() {
            const SYMBOLS = [
                { symbol: 'STAR', name: '大红八角 (Star Anise)', ticker: 'STAR_ANISE' },
                { symbol: 'CINN', name: '肉桂 (Cinnamon)', ticker: 'CINNAMON' }
            ];

            // 注意这里：klinechartsPro 的 P 必须大写
            const chart = new klinechartsPro.DefaultKLineChart({
                container: document.getElementById('chart'),
                symbol: SYMBOLS[0],
                datafeed: {
                    searchSymbols: () => Promise.resolve(SYMBOLS),
                    getHistoryKLineData: () => Promise.resolve([
                        { timestamp: 1704067200000, open: 30, high: 35, low: 29, close: 33, volume: 1000 }
                    ]),
                    subscribe: () => {},
                    unsubscribe: () => {}
                },
                theme: 'light',
                locale: 'zh-CN'
            });
        };
    </script>
</body>
</html>
