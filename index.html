<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZRC Spice Market Pro</title>
    <link rel="stylesheet" href="https://unpkg.com/@klinecharts/pro/dist/klinecharts-pro.css">
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: #f4f7f9; }
        #chart-container { width: 100vw; height: 100vh; }
        /* 增加一个加载提示，防止白屏时不知道进度 */
        #loading { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); font-family: sans-serif; color: #666; }
    </style>
</head>
<body>
    <div id="loading">行情加载中，请稍候...</div>
    <div id="chart-container"></div>

    <script src="https://unpkg.com/klinecharts/dist/klinecharts.min.js"></script>
    <script src="https://unpkg.com/@klinecharts/pro/dist/klinecharts-pro.umd.js"></script>

    <script>
        window.onload = function() {
            // 隐藏加载提示
            document.getElementById('loading').style.display = 'none';

            // 3. 您的 20 多个品种名单
            const SYMBOLS = [
                { symbol: 'STAR', name: '大红八角 (Star Anise)', exchange: 'YULIN', ticker: 'STAR_ANISE' },
                { symbol: 'CINN', name: '肉桂 (Cinnamon)', exchange: 'YULIN', ticker: 'CINNAMON' },
                { symbol: 'PEPPER', name: '黑胡椒 (Black Pepper)', exchange: 'YULIN', ticker: 'BLACK_PEPPER' }
            ];

            // 4. 初始化图表 (按官方 Pro 版标准)
            const chart = new klinechartspro.KLineChartPro({
                container: document.getElementById('chart-container'),
                symbol: SYMBOLS[0],
                // 极简数据源，确保能先出图
                datafeed: {
                    searchSymbols: (search) => Promise.resolve(SYMBOLS),
                    getHistoryKLineData: () => Promise.resolve([
                        { timestamp: 1704067200000, open: 30, high: 35, low: 29, close: 33, volume: 1000 }
                    ]),
                    subscribe: () => {},
                    unsubscribe: () => {}
                },
                theme: 'light',
                locale: 'zh-CN'
            });
            console.log("图表初始化成功！");
        };
    </script>
</body>
</html>
