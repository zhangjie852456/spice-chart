<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>ZRC Spice Pro</title>
    <link rel="stylesheet" href="https://unpkg.com/@klinecharts/pro/dist/klinecharts-pro.css">
    <style>
        /* 关键：强制占满全屏，防止高度为0 */
        html, body { margin: 0; padding: 0; width: 100%; height: 100%; background: #1b1b1f; overflow: hidden; }
        #chart-container { width: 100vw; height: 100vh; display: block; }
    </style>
</head>
<body>
    <div id="chart-container"></div>

    <script src="https://unpkg.com/klinecharts/dist/klinecharts.min.js"></script>
    <script src="https://unpkg.com/@klinecharts/pro/dist/klinecharts-pro.umd.js"></script>

    <script>
        window.onload = function() {
            // 3. 安全检查
            if (typeof klinechartsPro === 'undefined') {
                document.body.innerHTML = '<h1 style="color:white;padding:20px;">JS库加载失败，请检查网络！</h1>';
                return;
            }

            // 4. 正确的初始化名称
            const chartInstance = new klinechartsPro.DefaultKLineChart({
                container: document.getElementById('chart-container'),
                symbol: { ticker: 'STAR_ANISE', name: '大红八角' },
                datafeed: {
                    searchSymbols: () => Promise.resolve([{ ticker: 'STAR_ANISE', name: '大红八角' }]),
                    getHistoryKLineData: () => {
                        const data = [];
                        let price = 50;
                        for (let i = 0; i < 100; i++) {
                            price += Math.random() - 0.5;
                            data.push({
                                timestamp: Date.now() - (100 - i) * 86400000,
                                open: price, high: price + 1, low: price - 1, close: price + 0.2, volume: 100
                            });
                        }
                        return Promise.resolve(data);
                    },
                    subscribe: () => {},
                    unsubscribe: () => {}
                },
                theme: 'dark',
                locale: 'zh-CN'
            });
        };
    </script>
</body>
</html>
